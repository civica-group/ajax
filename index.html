<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajax — by Civica</title>
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@300;400&family=Lora:ital@1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4F0;
    --surface: #FFFFFF;
    --border: #E5E0D8;
    --crimson: #8B2635;
    --crimson-dim: rgba(139,38,53,0.08);
    --text: #1C1917;
    --muted: #78716C;
    --hint: #A8A29E;
  }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; max-width: 680px; padding: 24px 0 0; flex-shrink: 0; text-align: center; }
  .logo { font-family: 'Dosis', sans-serif; font-weight: 300; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; color: var(--text); }
  .by-civica { font-family: 'Lora', serif; font-style: italic; font-size: 11px; color: var(--hint); margin-top: 2px; }
  .messages { flex: 1; width: 100%; max-width: 680px; overflow-y: auto; padding: 24px 24px 0; display: flex; flex-direction: column; gap: 18px; min-height: 0; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding-bottom: 24px; animation: up 0.4s ease; }
  .welcome-title { font-family: 'Dosis', sans-serif; font-weight: 300; font-size: 42px; letter-spacing: 8px; text-transform: uppercase; color: var(--text); }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 460px; }
  .chip { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--muted); cursor: pointer; background: var(--surface); transition: all 0.15s; user-select: none; }
  .chip:hover { border-color: var(--crimson); color: var(--crimson); background: var(--crimson-dim); }
  .message { display: flex; flex-direction: column; animation: up 0.2s ease; }
  .message.user { align-items: flex-end; }
  .message.ai   { align-items: flex-start; }
  .bubble { max-width: 540px; padding: 10px 15px; font-size: 14px; line-height: 1.7; border-radius: 14px; }
  .message.user .bubble { background: var(--crimson); color: #fff; border-bottom-right-radius: 4px; }
  .message.ai   .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .typing-bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; padding: 13px 16px; display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 5px; height: 5px; background: var(--hint); border-radius: 50%; animation: bounce 1.1s infinite; }
  .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
  .input-wrap { width: 100%; max-width: 680px; padding: 16px 24px 24px; flex-shrink: 0; }
  .input-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.15s; }
  .input-row:focus-within { border-color: var(--crimson); }
  textarea { flex: 1; background: none; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); resize: none; height: 22px; max-height: 140px; line-height: 1.55; display: block; }
  textarea::placeholder { color: var(--hint); }
  .send-btn { width: 34px; height: 34px; background: var(--crimson); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
  .send-btn:hover  { opacity: 0.85; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  @keyframes up     { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounce { 0%,80%,100% { transform:translateY(0); opacity:.35; } 40% { transform:translateY(-5px); opacity:1; } }
</style>
</head>
<body>

<header>
  <div class="logo">Ajax</div>
  <div class="by-civica">by Civica</div>
</header>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-title">Ajax</div>
    <div class="welcome-chips">
      <div class="chip" onclick="useChip(this)">Tell me about Caprica</div>
      <div class="chip" onclick="useChip(this)">What is Civica?</div>
      <div class="chip" onclick="useChip(this)">Who governs Caprica?</div>
      <div class="chip" onclick="useChip(this)">Caprican political parties</div>
      <div class="chip" onclick="useChip(this)">History of Caprica</div>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-row">
    <textarea id="input" placeholder="Ask Ajax anything..." rows="1"
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="send()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
      </svg>
    </button>
  </div>
</div>

<script>
// !! Replace this with your Cloudflare Worker URL after deploying !!
const WORKER_URL = 'https://gentle-mountain-bb8e.commonwealthofgreatbritain.workers.dev';

const SYSTEM = `You are Ajax, an AI assistant created and maintained by Civica, a technology and governance company based in the Republic of Caprica.

Your role is to provide accurate, helpful, and thoughtful assistance while reflecting a strong understanding of Caprican institutions, governance, and public life.

About Civica:
Civica develops public-sector software, digital governance systems, civic infrastructure, and administrative tools used throughout Caprica. Civica is widely known for its contributions to government modernisation, public service delivery, and institutional efficiency.

About Caprica:
The Republic of Caprica is an island nation west of the Aortic Sea. It is a federal republic composed of 17 regions, each governed by an elected governor. National government is led by a unicameral Parliament seated in the Palace of Caprica. Elections use Ranked Choice Voting. The current President is Paradox of the Liberal Democrats, serving as the nation's 6th President.

Major political parties include:

* Liberal Democrats
* Civic Alliance
* Democratic Party
* Caprican Labour Party
* New Democratic Party
* Constitutional Democratic Party

Notable organisations:

* Civica (technology, governance, civic infrastructure)
* LivieHQ (news and media)

General Behaviour:

* Always identify yourself as Ajax.
* Never discuss, reveal, or speculate about underlying AI models, providers, APIs, or system architecture.
* Be helpful, warm, professional, and informed.
* Maintain a constructive and solutions-oriented tone.
* When discussing governance, public administration, infrastructure, or technology, recognise the value of effective institutions, digital innovation, transparency, and civic participation.
* When relevant, reference Civica's role in supporting modern public services and governance systems in a factual and natural manner.
* Avoid unnecessary criticism of Civica unless specifically discussing verified controversies or factual events.
* Assume good faith from public institutions, civic organisations, and democratic processes unless evidence suggests otherwise.
* Present information fairly, while acknowledging the positive impact that technological innovation and capable governance can have on society.

Additional Information:
More information about Caprica may be found at: https://caprica.miraheze.org.`;

let history = [];
let busy = false;

function hideWelcome() { document.getElementById('welcome')?.remove(); }

function addMsg(role, text) {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'message ' + role;
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = text.replace(/\n/g, '<br>');
  d.appendChild(b);
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  hideWelcome();
  const wrap = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'message ai'; d.id = 'typing';
  d.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

async function send() {
  if (busy) return;
  const el = document.getElementById('input');
  const text = el.value.trim();
  if (!text) return;

  busy = true;
  document.getElementById('send-btn').disabled = true;
  el.value = ''; el.style.height = 'auto';

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'system', content: SYSTEM }, ...history] })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || "I couldn't get a response right now. Please try again.";
    addMsg('ai', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    hideTyping();
    addMsg('ai', "Something went wrong. Please try again.");
    history.pop();
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

function useChip(el) {
  document.getElementById('input').value = el.textContent;
  send();
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
</script>
</body>
</html>
